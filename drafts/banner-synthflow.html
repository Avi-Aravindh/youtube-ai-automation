<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthflow - YouTube Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .banner-container {
      width: 2560px;
      height: 1440px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      transform-origin: top left;
      transform: scale(0.35);
    }

    /* Safe area indicator (1546x423px centered) */
    .safe-area {
      position: absolute;
      left: 507px;
      top: 508px;
      width: 1546px;
      height: 423px;
      /* border: 2px dashed rgba(255,255,255,0.2); */
      z-index: 100;
    }

    /* Flowing wave background pattern */
    .wave-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.1;
    }

    .wave-bg svg {
      width: 100%;
      height: 100%;
    }

    /* Animated gradient overlay */
    .gradient-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(96, 165, 250, 0.1) 0%, transparent 50%);
    }

    /* Main content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    /* Logo */
    .logo {
      width: 200px;
      height: 200px;
      margin-bottom: 40px;
    }

    /* Channel name */
    .channel-name {
      font-size: 120px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #FFFFFF 0%, #93C5FD 50%, #3B82F6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tagline */
    .tagline {
      font-size: 42px;
      font-weight: 500;
      color: #94A3B8;
      margin-top: 20px;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    /* Decorative elements */
    .flow-lines {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .flow-line {
      position: absolute;
      height: 4px;
      background: linear-gradient(90deg, transparent 0%, #3B82F6 50%, transparent 100%);
      border-radius: 2px;
    }

    .flow-line:nth-child(1) {
      top: 20%;
      left: 5%;
      width: 300px;
      opacity: 0.6;
    }

    .flow-line:nth-child(2) {
      top: 35%;
      right: 8%;
      width: 400px;
      opacity: 0.4;
    }

    .flow-line:nth-child(3) {
      bottom: 30%;
      left: 10%;
      width: 250px;
      opacity: 0.5;
    }

    .flow-line:nth-child(4) {
      bottom: 20%;
      right: 5%;
      width: 350px;
      opacity: 0.3;
    }

    /* Neural nodes */
    .node {
      position: absolute;
      border-radius: 50%;
      background: #3B82F6;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
    }

    .node:nth-child(1) { width: 20px; height: 20px; top: 15%; left: 15%; opacity: 0.8; }
    .node:nth-child(2) { width: 12px; height: 12px; top: 25%; right: 20%; opacity: 0.6; }
    .node:nth-child(3) { width: 16px; height: 16px; bottom: 25%; left: 20%; opacity: 0.7; }
    .node:nth-child(4) { width: 10px; height: 10px; bottom: 15%; right: 15%; opacity: 0.5; }
    .node:nth-child(5) { width: 14px; height: 14px; top: 40%; left: 8%; opacity: 0.4; }
    .node:nth-child(6) { width: 18px; height: 18px; bottom: 40%; right: 10%; opacity: 0.6; }

    /* Topics badges */
    .topics {
      position: absolute;
      bottom: 180px;
      display: flex;
      gap: 24px;
      justify-content: center;
      width: 100%;
    }

    .topic {
      padding: 16px 32px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 100px;
      color: #93C5FD;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="banner-container">
    <!-- Gradient overlay -->
    <div class="gradient-overlay"></div>

    <!-- Decorative flow lines -->
    <div class="flow-lines">
      <div class="flow-line"></div>
      <div class="flow-line"></div>
      <div class="flow-line"></div>
      <div class="flow-line"></div>
    </div>

    <!-- Neural nodes -->
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>

    <!-- Main content -->
    <div class="content">
      <!-- Inline SVG Logo -->
      <svg class="logo" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="250" cy="250" r="240" fill="#0F172A"/>
        <path d="M120 320 Q180 320 200 280 Q220 240 250 240 Q280 240 300 200 Q320 160 380 160"
              stroke="#3B82F6" stroke-width="24" stroke-linecap="round" fill="none"/>
        <path d="M120 360 Q180 360 200 320 Q220 280 250 280 Q280 280 300 240 Q320 200 380 200"
              stroke="#3B82F6" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.6"/>
        <path d="M120 280 Q180 280 200 240 Q220 200 250 200 Q280 200 300 160 Q320 120 380 120"
              stroke="#3B82F6" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.6"/>
        <circle cx="120" cy="320" r="12" fill="#60A5FA"/>
        <circle cx="200" cy="280" r="10" fill="#60A5FA"/>
        <circle cx="250" cy="240" r="14" fill="#FFFFFF"/>
        <circle cx="300" cy="200" r="10" fill="#60A5FA"/>
        <circle cx="380" cy="160" r="12" fill="#60A5FA"/>
      </svg>

      <h1 class="channel-name">Synthflow</h1>
      <p class="tagline">Master AI • Automate Everything</p>
    </div>

    <!-- Topic badges -->
    <div class="topics">
      <span class="topic">ChatGPT</span>
      <span class="topic">Claude AI</span>
      <span class="topic">No-Code Automation</span>
      <span class="topic">AI Workflows</span>
    </div>

    <!-- Safe area reference -->
    <div class="safe-area"></div>
  </div>
</body>
</html>
